<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0a0712">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>יוסי והצל הגלקטי — קריאת הספר</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:#0a0712; overflow:hidden; font-family:'Frank Ruhl Libre',serif;
    overscroll-behavior:none; }
  #reader { position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(120% 90% at 50% 30%, #15101f 0%, #0a0712 70%); }
  #page { max-width:100vw; max-height:100vh; max-height:100dvh; width:auto; height:auto;
    object-fit:contain; display:block; box-shadow:0 10px 50px rgba(0,0,0,.7);
    user-select:none; -webkit-user-drag:none; transition:opacity .12s ease; }
  /* tap zones: RTL — right half = previous, left half = next (forward) */
  .zone { position:fixed; top:0; bottom:0; width:38%; z-index:5; cursor:pointer; }
  .zone.prev { right:0; } .zone.next { left:0; }
  .arrow { position:fixed; top:50%; transform:translateY(-50%); z-index:6; font-size:40px; color:#fff;
    opacity:.0; transition:opacity .2s; pointer-events:none; text-shadow:0 2px 10px rgba(0,0,0,.8);
    background:rgba(0,0,0,.35); width:58px; height:58px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
  #reader.show-ui .arrow { opacity:.55; }
  .arrow.prev { right:14px; } .arrow.next { left:14px; }
  /* top bar */
  #bar { position:fixed; top:0; left:0; right:0; z-index:8; display:flex; align-items:center; justify-content:space-between;
    padding:10px 14px; color:#f3e6c4; font-size:14px; letter-spacing:1px;
    background:linear-gradient(to bottom, rgba(0,0,0,.55), rgba(0,0,0,0)); opacity:0; transition:opacity .3s;
    pointer-events:none; }
  #reader.show-ui #bar { opacity:1; }
  #bar .t { font-weight:700; }
  #bar .right { display:flex; align-items:center; gap:14px; pointer-events:auto; }
  #count { font-variant-numeric:tabular-nums; opacity:.9; }
  #fsbtn { background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25); color:#fff;
    border-radius:8px; padding:6px 10px; font-size:16px; cursor:pointer; line-height:1; }
  #fsbtn:hover { background:rgba(255,255,255,.22); }
  #prog { position:fixed; bottom:0; left:0; height:3px; background:linear-gradient(90deg,#ffce58,#ff5e2b);
    z-index:8; transition:width .2s; }
  #hint { position:fixed; bottom:16px; left:0; right:0; text-align:center; color:#f3e6c4; font-size:13px;
    z-index:8; opacity:.0; transition:opacity .4s; pointer-events:none; text-shadow:0 2px 8px rgba(0,0,0,.9); }
  #reader.show-ui #hint { opacity:.85; }
</style>
</head>
<body>
  <div id="reader" class="show-ui">
    <img id="page" alt="">
    <div class="zone prev" id="zPrev"></div>
    <div class="zone next" id="zNext"></div>
    <div class="arrow prev">›</div>
    <div class="arrow next">‹</div>
    <div id="bar">
      <span class="t">יוסי והצל הגלקטי</span>
      <span class="right"><span id="count"></span><button id="fsbtn" title="מסך מלא">⛶</button></span>
    </div>
    <div id="prog"></div>
    <div id="hint">הקישו על צד הדף כדי לדפדף · ימין = אחורה · שמאל = קדימה · ⛶ למסך מלא</div>
  </div>
<script>
  const PAGES = ["img/page-001.jpg","img/page-002.jpg","img/page-003.jpg","img/page-004.jpg","img/page-005.jpg","img/page-006.jpg","img/page-007.jpg","img/page-008.jpg","img/page-009.jpg","img/page-010.jpg","img/page-011.jpg","img/page-012.jpg","img/page-013.jpg","img/page-014.jpg","img/page-015.jpg","img/page-016.jpg","img/page-017.jpg","img/page-018.jpg","img/page-019.jpg","img/page-020.jpg","img/page-021.jpg","img/page-022.jpg","img/page-023.jpg","img/page-024.jpg","img/page-025.jpg","img/page-026.jpg","img/page-027.jpg","img/page-028.jpg","img/page-029.jpg","img/page-030.jpg","img/page-031.jpg","img/page-032.jpg","img/page-033.jpg","img/page-034.jpg","img/page-035.jpg","img/page-036.jpg","img/page-037.jpg","img/page-038.jpg","img/page-039.jpg","img/page-040.jpg","img/page-041.jpg","img/page-042.jpg","img/page-043.jpg","img/page-044.jpg","img/page-045.jpg","img/page-046.jpg","img/page-047.jpg","img/page-048.jpg","img/page-049.jpg","img/page-050.jpg","img/page-051.jpg","img/page-052.jpg","img/page-053.jpg","img/page-054.jpg","img/page-055.jpg","img/page-056.jpg","img/page-057.jpg","img/page-058.jpg","img/page-059.jpg","img/page-060.jpg","img/page-061.jpg","img/page-062.jpg","img/page-063.jpg","img/page-064.jpg","img/page-065.jpg","img/page-066.jpg","img/page-067.jpg","img/page-068.jpg","img/page-069.jpg","img/page-070.jpg","img/page-071.jpg","img/page-072.jpg","img/page-073.jpg","img/page-074.jpg","img/page-075.jpg","img/page-076.jpg","img/page-077.jpg","img/page-078.jpg","img/page-079.jpg","img/page-080.jpg","img/page-081.jpg","img/page-082.jpg","img/page-083.jpg","img/page-084.jpg","img/page-085.jpg","img/page-086.jpg","img/page-087.jpg","img/page-088.jpg"];
  let i = 0;
  const img = document.getElementById('page');
  const reader = document.getElementById('reader');
  const count = document.getElementById('count');
  const prog = document.getElementById('prog');
  const cache = {};
  function pre(n){ if(n>=0&&n<PAGES.length&&!cache[n]){const im=new Image();im.src=PAGES[n];cache[n]=im;} }
  function show(n){
    i = Math.max(0, Math.min(PAGES.length-1, n));
    img.style.opacity = 0;
    const im = new Image();
    im.onload = ()=>{ img.src = im.src; img.style.opacity = 1; };
    im.src = PAGES[i];
    count.textContent = (i+1) + ' / ' + PAGES.length;
    prog.style.width = ((i+1)/PAGES.length*100) + '%';
    pre(i+1); pre(i-1); pre(i+2);
    location.hash = (i+1);
  }
  function next(){ if(i<PAGES.length-1) show(i+1); }
  function prev(){ if(i>0) show(i-1); }
  document.getElementById('zNext').addEventListener('click', next);
  document.getElementById('zPrev').addEventListener('click', prev);
  // keyboard (RTL: Left = forward, Right = back)
  addEventListener('keydown', e=>{
    if(e.key==='ArrowLeft'||e.key===' '||e.key==='PageDown') { next(); e.preventDefault(); }
    else if(e.key==='ArrowRight'||e.key==='PageUp') { prev(); e.preventDefault(); }
    else if(e.key==='Home') show(0); else if(e.key==='End') show(PAGES.length-1);
    else if(e.key==='f'||e.key==='F') toggleFS();
  });
  // swipe
  let sx=0, sy=0, st=0;
  addEventListener('touchstart', e=>{ sx=e.touches[0].clientX; sy=e.touches[0].clientY; st=Date.now(); }, {passive:true});
  addEventListener('touchend', e=>{
    const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)>45 && Math.abs(dx)>Math.abs(dy)){ if(dx<0) next(); else prev(); }
  }, {passive:true});
  // fullscreen
  const fsbtn = document.getElementById('fsbtn');
  function toggleFS(){
    if(document.fullscreenElement){ document.exitFullscreen&&document.exitFullscreen(); }
    else { const el=document.documentElement; (el.requestFullscreen||el.webkitRequestFullscreen||function(){}).call(el); }
  }
  fsbtn.addEventListener('click', toggleFS);
  if(!(document.documentElement.requestFullscreen||document.documentElement.webkitRequestFullscreen)) fsbtn.style.display='none';
  // tap center toggles UI; auto-hide UI after a few seconds
  let uiTimer;
  function flashUI(){ reader.classList.add('show-ui'); clearTimeout(uiTimer); uiTimer=setTimeout(()=>reader.classList.remove('show-ui'), 2800); }
  ['click','touchend','mousemove','keydown'].forEach(ev=>addEventListener(ev, flashUI, {passive:true}));
  // start (respect #hash deep-link)
  const start = parseInt(location.hash.replace('#',''),10);
  show(isFinite(start)&&start>0 ? start-1 : 0);
  flashUI();
</script>
</body>
</html>
